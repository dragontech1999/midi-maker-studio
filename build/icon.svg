<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1035"/>
      <stop offset="100%" style="stop-color:#0d0d18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="keys" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fd79a8"/>
      <stop offset="50%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="48" y="48" width="416" height="416" rx="72" fill="none" stroke="#6c5ce7" stroke-width="4" opacity="0.35"/>
  <!-- Piano keys -->
  <rect x="96" y="280" width="48" height="136" rx="6" fill="url(#keys)" opacity="0.95"/>
  <rect x="152" y="240" width="48" height="176" rx="6" fill="#eeeef5"/>
  <rect x="208" y="200" width="48" height="216" rx="6" fill="url(#accent)"/>
  <rect x="264" y="240" width="48" height="176" rx="6" fill="#eeeef5"/>
  <rect x="320" y="260" width="48" height="156" rx="6" fill="url(#keys)" opacity="0.85"/>
  <rect x="376" y="290" width="48" height="126" rx="6" fill="url(#accent)" opacity="0.8"/>
  <!-- Staff lines -->
  <g stroke="#6c5ce7" stroke-width="3" opacity="0.5">
    <line x1="80" y1="120" x2="432" y2="120"/>
    <line x1="80" y1="140" x2="432" y2="140"/>
    <line x1="80" y1="160" x2="432" y2="160"/>
    <line x1="80" y1="180" x2="432" y2="180"/>
  </g>
  <!-- Notes -->
  <ellipse cx="140" cy="155" rx="14" ry="10" fill="#fd79a8"/>
  <ellipse cx="220" cy="135" rx="14" ry="10" fill="#00cec9"/>
  <ellipse cx="300" cy="165" rx="14" ry="10" fill="#a29bfe"/>
  <ellipse cx="380" cy="145" rx="14" ry="10" fill="#fd79a8"/>
  <!-- Waveform -->
  <path d="M96 420 Q128 400 160 420 T224 420 T288 420 T352 420 T416 420" fill="none" stroke="#00cec9" stroke-width="4" opacity="0.6"/>
</svg>
